<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Catálogo CQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/custom.css">
</head>
<body class="bg-gradient-to-br from-slate-900 to-slate-800 h-screen flex items-center justify-center p-4">
    
    <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl overflow-hidden animate-fade-in">
        <div class="p-8">
            <div class="text-center mb-10">
                <div class="inline-flex items-center justify-center w-20 h-20 bg-red-600 rounded-2xl mb-4 shadow-lg shadow-red-600/30">
                    <span class="text-white text-3xl font-black italic">CQ</span>
                </div>
                <h1 class="text-2xl font-bold text-gray-800">Panel Administrativo</h1>
                <p class="text-gray-500 text-sm mt-2">Ingresa tus credenciales para continuar</p>
            </div>

            <form id="login-form" class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Usuario</label>
                    <input type="text" id="username" required
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition-all"
                        placeholder="admin">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Contraseña</label>
                    <div class="relative">
                        <input type="password" id="password" required
                            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition-all"
                            placeholder="••••••••">
                        <button type="button" id="toggle-password" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div id="error-message" class="hidden text-red-500 text-sm text-center font-medium bg-red-50 py-2 rounded-lg">
                    Credenciales incorrectas. Inténtalo de nuevo.
                </div>

                <button type="submit" class="w-full py-4 bg-red-600 hover:bg-red-700 text-white font-bold rounded-xl shadow-lg shadow-red-600/40 transition-all active:scale-95">
                    Entrar al Panel
                </button>
            </form>
        </div>
        
        <div class="bg-gray-50 p-4 text-center">
            <p class="text-xs text-gray-400">© 2026 Catálogo CQ - Todos los derechos reservados</p>
        </div>
    </div>

    <div id="toast-container"></div>

    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Lógica de la pantalla de login
        const loginForm = document.getElementById('login-form');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const togglePassword = document.getElementById('toggle-password');
        const errorMessage = document.getElementById('error-message');

        // Mostrar/Ocultar contraseña
        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
        });

        // Manejar envío de formulario
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const user = usernameInput.value;
            const pass = passwordInput.value;

            if (Auth.login(user, pass)) {
                Utils.showToast('Bienvenido, Admin', 'success');
                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 1000);
            } else {
                errorMessage.classList.remove('hidden');
                passwordInput.value = '';
                passwordInput.focus();
            }
        });

        // Si ya está logueado, redirigir a admin
        if (Auth.isLoggedIn()) {
            window.location.href = 'admin.html';
        }
    </script>
</body>
</html>
